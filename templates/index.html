<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas SPI - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-app: #0f172a; --bg-panel: #1e293b; --bg-hover: #334155;
            --primary: #0ea5e9; --primary-hover: #0284c7; --text-main: #f8fafc;
            --text-muted: #94a3b8; --border: #334155; --warning: #eab308;
            --success: #22c55e; --danger: #ef4444;
        }

        body.light-mode {
            --bg-app: #f1f5f9; --bg-panel: #ffffff; --bg-hover: #e2e8f0;
            --primary: #0284c7; --primary-hover: #0369a1; --text-main: #0f172a;
            --text-muted: #64748b; --border: #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-app); color: var(--text-main); height: 100vh;
            display: flex; overflow: hidden; transition: background-color 0.3s, color 0.3s;
        }

        /* ----- SIDEBAR ESQUERDA ----- */
        .sidebar-left {
            width: 280px; background-color: var(--bg-panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 1.5rem 1rem;
        }

        .brand {
            display: flex; align-items: center; gap: 12px; font-size: 1.2rem;
            font-weight: 700; color: var(--primary); margin-bottom: 2rem;
        }

        .btn-new-chat {
            background-color: transparent; color: var(--text-main); border: 1px solid var(--border);
            padding: 0.8rem; border-radius: 8px; cursor: pointer; display: flex;
            align-items: center; gap: 10px; margin-bottom: 2rem; transition: 0.2s;
        }
        .btn-new-chat:hover { background-color: var(--bg-hover); }

        .menu-section { margin-bottom: 1.5rem; }
        .menu-title { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.8rem; font-weight: 600; }

        .menu-item {
            padding: 0.6rem 0.5rem; border-radius: 6px; cursor: pointer; display: flex;
            align-items: center; justify-content: space-between; font-size: 0.9rem; transition: 0.2s;
        }
        .menu-item:hover { background-color: var(--bg-hover); }

        /* ----- ÁREA CENTRAL (CHAT) ----- */
        .main-chat { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-app); }
        .chat-area { flex: 1; padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.5rem; }
        
        .message-wrapper { display: flex; width: 100%; flex-direction: column; }
        .system { align-items: flex-start; }
        .user { align-items: flex-end; }
        .message { max-width: 80%; padding: 1rem; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; }
        .system .message { background-color: var(--bg-panel); border: 1px solid var(--border); }
        .user .message { background-color: var(--primary); color: white; }

        .input-area { padding: 1.5rem; background-color: var(--bg-panel); border-top: 1px solid var(--border); }
        .input-wrapper { display: flex; background-color: var(--bg-app); border: 1px solid var(--border); border-radius: 30px; padding: 0.4rem; }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 0 1rem; outline: none; }
        
        .btn-buscar { background-color: var(--primary); color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 25px; cursor: pointer; font-weight: 600; }

        /* ----- MODAIS ----- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center;
            align-items: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content { background-color: var(--bg-panel); width: 450px; border-radius: 12px; padding: 2rem; position: relative; border: 1px solid var(--border); }
        .close-modal { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; }

        .config-group { margin-bottom: 1.2rem; }
        .config-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: var(--text-muted); }
        .config-group input, .config-group textarea { width: 100%; padding: 10px; border-radius: 6px; background: var(--bg-app); border: 1px solid var(--border); color: white; outline: none; }

        .btn-action { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; background-color: var(--primary); color: white; margin-top: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar-left">
        <div class="brand"><i class="fa-solid fa-network-wired"></i> <span>Consultas SPI</span></div>
        <button class="btn-new-chat" onclick="limparChat()"><i class="fa-solid fa-plus"></i> Novo Chat</button>

        <div class="menu-section">
            <div class="menu-title">Bases de Dados</div>
            <div class="menu-item" onclick="abrirConfig()"><span><i class="fa-solid fa-gear"></i> Configurações</span></div>
            <div class="menu-item" onclick="abrirTelaLogin()" style="color: var(--warning);"><span><i class="fa-solid fa-lock"></i> Painel Admin</span></div>
        </div>

        <div style="margin-top: auto; font-size: 0.7rem; color: var(--text-muted); text-align: center;">
            v2.0 - Março 2026
        </div>
    </aside>

    <main class="main-chat">
        <div class="chat-area" id="chatArea">
            <div class="message-wrapper system">
                <div class="message">Olá! Digite a <b>Sigla</b> da base para consultar o plantão de hoje (2/3).</div>
            </div>
        </div>

        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="siglaInput" placeholder="Ex: SJC, PNI, AJR..." autocomplete="off">
                <button class="btn-buscar" onclick="realizarBusca()">Buscar</button>
            </div>
        </footer>
    </main>

    <div class="modal-overlay" id="loginModal">
        <div class="modal-content" style="width: 320px;">
            <button class="close-modal" onclick="fecharLogin()">&times;</button>
            <h3 style="text-align: center; margin-bottom: 1.5rem;">Acesso Restrito</h3>
            <div class="config-group">
                <label>Usuário (Matrícula)</label>
                <input type="text" id="usuarioAdmin" placeholder="81032045">
            </div>
            <div class="config-group">
                <label>Senha</label>
                <input type="password" id="senhaAdmin">
            </div>
            <button class="btn-action" id="btnLogin" onclick="fazerLoginAdmin()">Entrar</button>
        </div>
    </div>

    <div class="modal-overlay" id="adminModal">
        <div class="modal-content" style="width: 600px; max-height: 80vh; overflow-y: auto;">
            <button class="close-modal" onclick="fecharAdmin()">&times;</button>
            <h3 style="color: var(--warning); margin-bottom: 1.5rem;">Painel de Controle</h3>
            
            <div class="config-group" style="background: var(--bg-app); padding: 15px; border-radius: 8px;">
                <h4 style="margin-bottom: 10px; font-size: 0.9rem;">Upload de Escala (.xlsx)</h4>
                <input type="file" id="fileEscala" style="border: none; background: none;">
                <button class="btn-action" style="background: var(--success);" onclick="uploadEscala()">Sincronizar Escala</button>
            </div>

            <h4 style="margin: 1.5rem 0 10px; font-size: 0.9rem; color: var(--text-muted);">Sugestões Recebidas</h4>
            <div id="listaSugestoes" style="display: flex; flex-direction: column; gap: 10px;">
                </div>
        </div>
    </div>

    <div class="modal-overlay" id="configModal">
        <div class="modal-content">
            <button class="close-modal" onclick="fecharConfig()">&times;</button>
            <h3>Configurações</h3>
            <br>
            <div class="config-group">
                <label>Seu Nome</label>
                <input type="text" id="nomeUser" value="Victor Henrique">
            </div>
            <hr style="border-color: var(--border); margin: 15px 0;">
            <div class="config-group">
                <label>Enviar Sugestão/Melhoria</label>
                <textarea id="textoMsg" rows="3" placeholder="O que podemos melhorar?"></textarea>
            </div>
            <button class="btn-action" onclick="enviarSugestao()">Enviar Sugestão</button>
        </div>
    </div>

    <script>
        // --- FUNÇÕES DE INTERFACE ---
        function abrirConfig() { document.getElementById('configModal').classList.add('active'); }
        function fecharConfig() { document.getElementById('configModal').classList.remove('active'); }
        function abrirTelaLogin() { document.getElementById('loginModal').classList.add('active'); }
        function fecharLogin() { document.getElementById('loginModal').classList.remove('active'); }
        function fecharAdmin() { document.getElementById('adminModal').classList.remove('active'); }
        function limparChat() { document.getElementById('chatArea').innerHTML = ''; }

        // --- BUSCA NO CHAT (CONECTADO AO MAIN.PY) ---
        async function realizarBusca() {
            const input = document.getElementById('siglaInput');
            const msg = input.value.trim().toUpperCase();
            if(!msg) return;

            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML += `<div class="message-wrapper user"><div class="message">${msg}</div></div>`;
            input.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg, data: "2/3" }) // Data de hoje fixa conforme solicitado
                });
                const data = await response.json();
                
                let respHtml = data.response.cabecalho || data.response.erro;
                if(data.response.tx) {
                    data.response.tx.forEach(t => respHtml += `<br><br>${t}`);
                }

                chatArea.innerHTML += `<div class="message-wrapper system"><div class="message">${respHtml}</div></div>`;
                chatArea.scrollTop = chatArea.scrollHeight;
            } catch (e) {
                alert("Erro ao conectar com o servidor.");
            }
        }

        // --- LOGIN SEGURO (CONECTADO AO RENDER) ---
        async function fazerLoginAdmin() {
            const user = document.getElementById('usuarioAdmin').value;
            const pass = document.getElementById('senhaAdmin').value;
            const btn = document.getElementById('btnLogin');

            btn.innerHTML = "Verificando...";
            
            const resp = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ usuario: user, senha: pass })
            });

            if(resp.ok) {
                fecharLogin();
                document.getElementById('adminModal').classList.add('active');
                carregarSugestoes();
            } else {
                alert("Usuário ou Senha incorretos!");
                btn.innerHTML = "Entrar";
            }
        }

        // --- SUGESTÕES NO BANCO NEON ---
        async function enviarSugestao() {
            const nome = document.getElementById('nomeUser').value;
            const texto = document.getElementById('textoMsg').value;
            
            await fetch('/sugestoes', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ usuario: nome, texto: texto })
            });
            
            alert("Sugestão enviada com sucesso!");
            document.getElementById('textoMsg').value = '';
            fecharConfig();
        }

        async function carregarSugestoes() {
            const resp = await fetch('/admin/listar-sugestoes');
            const lista = await resp.json();
            const container = document.getElementById('listaSugestoes');
            container.innerHTML = '';

            lista.forEach(s => {
                container.innerHTML += `
                    <div style="background: var(--bg-app); padding: 10px; border-radius: 6px; border-left: 3px solid var(--primary);">
                        <small style="color: var(--primary);">${s.usuario} - ${s.data}</small>
                        <p style="font-size: 0.85rem; margin-top: 5px;">${s.texto}</p>
                    </div>
                `;
            });
        }

        // Enter no input
        document.getElementById('siglaInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') realizarBusca();
        });
    </script>
</body>
</html>
