<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas SPI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Paleta de Cores Moderna e Reset */
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --warning: #eab308;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container Principal */
        .app-container {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* Cabeçalho */
        .header {
            background-color: var(--bg-panel);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary);
        }

        .brand i { font-size: 1.4rem; }

        .btn-admin {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .btn-admin:hover {
            background-color: var(--border);
            color: var(--text-main);
        }

        /* Área de Chat */
        .chat-area {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Estilo das Mensagens */
        .message-wrapper {
            display: flex;
            width: 100%;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.2rem;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .system {
            justify-content: flex-start;
        }
        
        .system .message {
            background-color: var(--bg-panel);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .user {
            justify-content: flex-end;
        }

        .user .message {
            background-color: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .warning-msg {
            color: var(--warning);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Área de Input */
        .input-area {
            padding: 1.5rem 2rem;
            background-color: var(--bg-panel);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            background-color: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 0.4rem;
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 0 1.5rem;
            font-size: 1rem;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .btn-buscar {
            background-color: var(--primary);
            color: #fff;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-buscar:hover {
            background-color: var(--primary-hover);
        }

        /* Rodapé */
        .footer {
            text-align: center;
            padding: 0.8rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            background-color: var(--bg-panel);
        }
        
        .footer strong { color: var(--primary); }

        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <div class="brand">
                <i class="fa-solid fa-network-wired"></i>
                <span>Consultas SPI</span>
            </div>
            <button class="btn-admin"><i class="fa-solid fa-gear"></i> Admin</button>
        </header>

        <main class="chat-area" id="chatArea">
            
            <div class="message-wrapper system">
                <div class="message">
                    Sistema Operacional Ativo. <i class="fa-solid fa-globe" style="color: var(--primary);"></i><br>
                    <span style="color: var(--text-muted);">Informe a Sigla para consultar o plantão.</span>
                </div>
            </div>

            <div class="message-wrapper user">
                <div class="message">ajr</div>
            </div>

            <div class="message-wrapper system">
                <div class="message">Sigla não encontrada no banco de dados.</div>
            </div>

            <div class="message-wrapper user">
                <div class="message">sjr</div>
            </div>

            <div class="message-wrapper system">
                <div class="message warning-msg">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    Nenhum técnico exclusivo da base <strong>SJV</strong> de plantão hoje.
                </div>
            </div>

        </main>

        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="siglaInput" placeholder="Ex: SJC ou PNI..." autocomplete="off">
                <button class="btn-buscar" id="btnBuscar">Buscar</button>
            </div>
        </footer>

        <div class="footer">
            © 2026 Consultas SPI | Desenvolvido por <strong>Victor Henrique de Oliveira</strong>
        </div>
    </div>

</body>
</html>
