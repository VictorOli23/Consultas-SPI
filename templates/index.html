<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas SPI - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-app: #0f172a; --bg-panel: #1e293b; --bg-hover: #334155;
            --primary: #0ea5e9; --primary-hover: #0284c7; --text-main: #f8fafc;
            --text-muted: #94a3b8; --border: #334155; --warning: #eab308;
            --success: #22c55e; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-app); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }
        
        /* Sidebar */
        .sidebar-left { width: 280px; background-color: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.5rem 1rem; }
        .brand { display: flex; align-items: center; gap: 12px; font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 2rem; }
        .menu-item { padding: 0.8rem; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; font-size: 0.9rem; }
        .menu-item:hover { background-color: var(--bg-hover); }

        /* Main Chat */
        .main-chat { flex: 1; display: flex; flex-direction: column; }
        .chat-area { flex: 1; padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
        .message { max-width: 80%; padding: 1rem; border-radius: 12px; background: var(--bg-panel); border: 1px solid var(--border); line-height: 1.5; }
        .user-msg { align-self: flex-end; background: var(--primary); border: none; }

        .input-area { padding: 1.5rem; background: var(--bg-panel); border-top: 1px solid var(--border); }
        .input-wrapper { display: flex; background: var(--bg-app); border-radius: 30px; padding: 0.5rem; border: 1px solid var(--border); }
        .input-wrapper input { flex: 1; background: transparent; border: none; color: white; padding: 0 1rem; outline: none; }
        .btn-buscar { background: var(--primary); color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 25px; cursor: pointer; font-weight: 600; }

        /* Modais */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; visibility: hidden; opacity: 0; transition: 0.3s; z-index: 1000; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-content { background: var(--bg-panel); width: 500px; padding: 2rem; border-radius: 12px; border: 1px solid var(--border); position: relative; }
        .btn-action { width: 100%; padding: 12px; border-radius: 8px; border: none; color: white; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        
        .upload-box { background: var(--bg-app); padding: 1.2rem; border-radius: 8px; margin-bottom: 1rem; border: 1px dashed var(--border); }
    </style>
</head>
<body>

    <aside class="sidebar-left">
        <div class="brand"><i class="fa-solid fa-network-wired"></i> Consultas SPI</div>
        <div class="menu-item" onclick="abrirConfig()"><i class="fa-solid fa-gear"></i> Configurações</div>
        <div class="menu-item" onclick="abrirLogin()" style="color: var(--warning)"><i class="fa-solid fa-lock"></i> Painel Admin</div>
    </aside>

    <main class="main-chat">
        <div class="chat-area" id="chatArea">
            <div class="message">Olá! Informe a <b>Sigla</b> para consultar o plantão de hoje.</div>
        </div>
        <footer class="input-area">
            <div class="input-wrapper">
                <input type="text" id="siglaInput" placeholder="Ex: SJC...">
                <button class="btn-buscar" onclick="realizarBusca()">Buscar</button>
            </div>
        </footer>
    </main>

    <div class="modal-overlay" id="modalLogin">
        <div class="modal-content" style="width: 320px;">
            <h3 style="text-align: center; margin-bottom: 1rem;">Admin Login</h3>
            <input type="text" id="userAdmin" placeholder="Usuário" style="width:100%; padding:10px; margin-bottom:10px; background:#0f172a; border:1px solid #334155; color:white;">
            <input type="password" id="passAdmin" placeholder="Senha" style="width:100%; padding:10px; margin-bottom:10px; background:#0f172a; border:1px solid #334155; color:white;">
            <button class="btn-action" onclick="fazerLogin()">Entrar</button>
            <button onclick="fecharModais()" style="background:none; color:gray; border:none; width:100%; margin-top:10px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalAdmin">
        <div class="modal-content">
            <h3 style="color:var(--warning); margin-bottom: 1.5rem;">Sincronização de Dados</h3>
            
            <div class="upload-box">
                <label style="font-size:0.8rem; color:var(--text-muted);">Planilha de SITES</label>
                <input type="file" id="fileSites" style="margin: 10px 0; display:block;">
                <button class="btn-action" id="btnSites" onclick="uploadPlanilha('sites')" style="background:var(--primary);">Sincronizar Sites</button>
            </div>

            <div class="upload-box">
                <label style="font-size:0.8rem; color:var(--text-muted);">Planilha de ESCALA</label>
                <input type="file" id="fileEscala" style="margin: 10px 0; display:block;">
                <button class="btn-action" id="btnEscala" onclick="uploadPlanilha('escala')" style="background:var(--success);">Sincronizar Escala</button>
            </div>

            <h4 style="margin-top:1.5rem; font-size:0.9rem;">Sugestões Recebidas</h4>
            <div id="listaSugestoes" style="max-height: 150px; overflow-y:auto; margin-top:10px;"></div>
            
            <button class="btn-action" onclick="fecharModais()" style="background:var(--bg-hover); margin-top:20px;">Fechar Painel</button>
        </div>
    </div>

    <script>
        function abrirLogin() { document.getElementById('modalLogin').classList.add('active'); }
        function fecharModais() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

        async function fazerLogin() {
            const user = document.getElementById('userAdmin').value;
            const pass = document.getElementById('passAdmin').value;
            const resp = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ usuario: user, senha: pass })
            });
            if(resp.ok) {
                fecharModais();
                document.getElementById('modalAdmin').classList.add('active');
                carregarSugestoes();
            } else { alert("Incorreto!"); }
        }

        async function uploadPlanilha(tipo) {
            const btn = tipo === 'sites' ? document.getElementById('btnSites') : document.getElementById('btnEscala');
            const fileInput = tipo === 'sites' ? document.getElementById('fileSites') : document.getElementById('fileEscala');
            const rota = tipo === 'sites' ? '/upload_sites' : '/upload_escala';
            
            if(!fileInput.files[0]) return alert("Selecione o arquivo!");

            const formData = new FormData();
            formData.append('planilha', fileInput.files[0]);

            // Animação Girando
            const labelOriginal = btn.innerText;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sincronizando...';
            btn.disabled = true;

            try {
                const resp = await fetch(rota, { method: 'POST', body: formData });
                if(resp.ok) {
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> OK, Sincronizado!';
                    btn.style.background = "var(--success)";
                    setTimeout(() => {
                        btn.innerHTML = labelOriginal;
                        btn.disabled = false;
                        btn.style.background = tipo === 'sites' ? "var(--primary)" : "var(--success)";
                    }, 3000);
                }
            } catch (e) { alert("Erro!"); btn.innerHTML = labelOriginal; btn.disabled = false; }
        }

        async function realizarBusca() {
            const input = document.getElementById('siglaInput');
            const chat = document.getElementById('chatArea');
            if(!input.value) return;
            
            chat.innerHTML += `<div class="message user-msg">${input.value}</div>`;
            const resp = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: input.value, data: "2/3" })
            });
            const data = await response.json();
            chat.innerHTML += `<div class="message">${data.response.cabecalho || "Erro"}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
        }

        async function carregarSugestoes() {
            const resp = await fetch('/admin/listar-sugestoes');
            const lista = await resp.json();
            document.getElementById('listaSugestoes').innerHTML = lista.map(s => `<div style="font-size:0.8rem; border-bottom:1px solid #334155; padding:5px;"><b>${s.usuario}:</b> ${s.texto}</div>`).join('');
        }
    </script>
</body>
</html>
